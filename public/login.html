<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — ReviewAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">⭐</div>
      <span class="nav-logo-text">Review<span>AI</span></span>
    </a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">⭐</div>
      <h1>Bienvenido de vuelta</h1>
      <p>Iniciá sesión en tu cuenta de ReviewAI</p>
    </div>
    <div class="card">
      <div id="alert-box"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="tu@email.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span id="btn-text">Iniciar sesión →</span>
          <span id="btn-loading" style="display:none"><span class="spinner"></span> Ingresando...</span>
        </button>
      </form>
    </div>
    <div class="auth-footer">
      ¿No tenés cuenta? <a href="/register.html">Registrate gratis →</a>
    </div>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('btn-loading').style.display = 'flex';
  btn.disabled = true;
  document.getElementById('alert-box').innerHTML = '';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    window.location.href = '/dashboard';
  } catch (err) {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    document.getElementById('btn-text').style.display = 'inline';
    document.getElementById('btn-loading').style.display = 'none';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
