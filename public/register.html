<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear cuenta gratis — ReviewAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">⭐</div>
      <span class="nav-logo-text">Review<span>AI</span></span>
    </a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card" style="max-width:460px">
    <div class="auth-logo">
      <div class="logo-icon">🚀</div>
      <h1>Empezá gratis hoy</h1>
      <p>7 días de prueba · Sin tarjeta de crédito</p>
    </div>

    <div class="card">
      <div id="alert-box"></div>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Nombre de tu negocio</label>
          <input type="text" id="business" class="form-input" placeholder="Ej: Restaurante La Esquina"/>
        </div>
        <div class="form-group">
          <label class="form-label">Tu email</label>
          <input type="email" id="email" class="form-input" placeholder="tu@email.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="reg-btn">
          <span id="btn-text">Crear mi cuenta gratis →</span>
          <span id="btn-loading" style="display:none"><span class="spinner"></span> Creando cuenta...</span>
        </button>
        <p style="font-size:.78rem;color:var(--muted);text-align:center;margin-top:12px">
          Al registrarte aceptás nuestros <a href="#" style="color:var(--purple2)">Términos de uso</a>
        </p>
      </form>
    </div>

    <div class="auth-footer">
      ¿Ya tenés cuenta? <a href="/login.html">Iniciar sesión →</a>
    </div>

    <!-- Social proof -->
    <div style="margin-top:24px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px">
      <div style="font-size:1.5rem">⭐</div>
      <div>
        <div style="font-size:.82rem;font-weight:700">+200 negocios ya usan ReviewAI</div>
        <div style="font-size:.75rem;color:var(--muted)">Restaurantes, clínicas, hoteles y más en toda Latinoamérica</div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const business = document.getElementById('business').value;
  if (password.length < 6) {
    document.getElementById('alert-box').innerHTML = '<div class="alert alert-error">La contraseña debe tener al menos 6 caracteres</div>';
    return;
  }
  const btn = document.getElementById('reg-btn');
  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('btn-loading').style.display = 'flex';
  btn.disabled = true;
  document.getElementById('alert-box').innerHTML = '';

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, business })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    window.location.href = '/dashboard';
  } catch (err) {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    document.getElementById('btn-text').style.display = 'inline';
    document.getElementById('btn-loading').style.display = 'none';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
